build:
  docker:
    web: Dockerfile.heroku

release:
  image: web
  # Must be a single command string — split into argv-style items, Heroku ran
  # bare `python` (exits 0 on EOF) and migrations silently never applied.
  command:
    - python manage.py migrate

run:
  web: gunicorn config.wsgi:application --bind "0.0.0.0:$PORT" --workers 2 --timeout 120
