name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        # Pinned to match backend container; unpinned ruff broke CI when new rules shipped
        run: pip install ruff==0.8.5

      - name: Run ruff check
        run: ruff check backend/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dignifi
          POSTGRES_PASSWORD: dignifi
          POSTGRES_DB: dignifi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dignifi:dignifi@localhost:5432/dignifi_test
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      # Must be a real Fernet key (32 url-safe base64 bytes) — encrypted_model_fields
      # validates it at import. CI-only; encrypts nothing but synthetic test data.
      FIELD_ENCRYPTION_KEY: U9HKckkKBeT8wag2jMcOx2Cez2M2jtvNG4qxSHuYcAo=
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements/test.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/test.txt

      - name: Create logs directory
        run: mkdir -p backend/logs

      - name: Run tests with coverage
        working-directory: backend
        # --cov-fail-under floors coverage (currently ~95%) so it can't silently regress.
        run: pytest --cov=apps --cov=config --cov-fail-under=90 --tb=short -q

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bandit SAST (fail on high severity)
        run: |
          pip install bandit
          bandit -r backend/apps backend/config --severity-level high --confidence-level medium -q

      - name: pip-audit — backend dependency CVEs (advisory)
        # Advisory for now: the pinned deps carry known CVEs tracked under BIZ-61.
        # Surface them without blocking; flip to blocking once the backlog is cleared.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements/base.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit — frontend dependencies (advisory)
        # Advisory for now: ~2 high-severity advisories remain in production deps
        # (plus dev-toolchain ones) — tracked under BIZ-61. Surface, don't block;
        # flip to blocking after `npm audit fix` clears them.
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dignifi
          POSTGRES_PASSWORD: dignifi
          POSTGRES_DB: dignifi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dignifi:dignifi@localhost:5432/dignifi_test
      # settings.test forces sqlite :memory:, which evaporates between manage.py
      # invocations — migrate/loaddata/runserver must share the postgres service.
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      # Must be a real Fernet key (32 url-safe base64 bytes) — encrypted_model_fields
      # validates it at import. CI-only; encrypts nothing but synthetic test data.
      FIELD_ENCRYPTION_KEY: U9HKckkKBeT8wag2jMcOx2Cez2M2jtvNG4qxSHuYcAo=
      DEBUG: "True"
      # Playwright serves the app on :5173 and calls the backend at :8000 (cross-origin),
      # so the registration POST is CORS-checked. base.py defaults to :3000 only; without
      # this the browser blocks account creation. Previously supplied by the committed
      # .env, which was untracked in BIZ-60 — CI now declares it explicitly.
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install backend dependencies
        # development.txt: settings.development needs django_extensions
        run: pip install -r backend/requirements/development.txt

      - name: Create logs directory
        run: mkdir -p backend/logs

      - name: Run migrations and seed data
        working-directory: backend
        run: |
          python manage.py migrate --noinput
          python manage.py loaddata ilnd_2025_data
          python manage.py seed_demo_data

      - name: Start backend server
        working-directory: backend
        run: python manage.py runserver 0.0.0.0:8000 &

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend and run E2E tests
        working-directory: frontend
        run: |
          npm run dev &
          sleep 5
          npm run e2e
        env:
          VITE_API_URL: http://localhost:8000/api

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: frontend/test-results/
