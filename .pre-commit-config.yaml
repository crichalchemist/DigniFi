# Pre-commit hooks for DigniFi
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'  # Allow trailing spaces in markdown (line breaks)
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python: Ruff (linting + import sorting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/

  # Python: Black (formatting)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/
        args: [--line-length=100]

  # JavaScript/TypeScript: Prettier (formatting)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|scss|md)$
        exclude: ^backend/
        additional_dependencies:
          - prettier@3.4.2

  # JavaScript/TypeScript: ESLint (linting)
  # Uses local node_modules (symlinked from main repo) so eslint.config.js resolves.
  # pass_filenames: true so only staged files are linted, not the entire src/ tree.
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && node_modules/.bin/eslint --fix --max-warnings=0 "${@#frontend/}" --' --
        files: ^frontend/src/.*\.[jt]sx?$
        pass_filenames: true
